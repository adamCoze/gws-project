services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gws-app
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/app/backend
      - ./dist:/app/dist
      - /etc/localtime:/etc/localtime:ro
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
